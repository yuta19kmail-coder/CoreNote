<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoreNote - Miro風ホワイトボード（開発中サンプル）</title>
<link rel="icon" type="image/png" href="favicon.png?v=1">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=1">
<link rel="manifest" href="manifest.json?v=1">
<meta name="theme-color" content="#ec4899">
<link rel="stylesheet" href="css/launcher.css?v=6">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --acc:#ec4899; --acc2:#f472b6; --accd:#db2777;
    --bg:#0e1116; --bg2:#161b22; --bg3:#1d242e; --bg4:#252e3a;
    --text:#e6edf3; --text2:#9aa7b4; --text3:#6b7886;
    --border:rgba(255,255,255,.10); --r:12px;
    --dot:rgba(150,160,175,.20); --cvbg:#10141a;
  }
  [data-theme="light"]{
    --bg:#f1f5f9; --bg2:#ffffff; --bg3:#eef2f7; --bg4:#e2e8f0;
    --text:#0f172a; --text2:#475569; --text3:#94a3b8; --border:rgba(15,23,42,.12);
    --dot:rgba(80,90,110,.22); --cvbg:#f7f8fb;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic Medium","Meiryo",sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  .dev-badge{display:inline-flex;align-items:center;gap:5px;margin-left:10px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;color:#fff;border:1px solid rgba(255,255,255,.25);background:repeating-linear-gradient(45deg,#db2777,#db2777 8px,#be185d 8px,#be185d 16px)}

  /* ===== ログイン ===== */
  #cn-login{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 50% -10%,#46102c 0%,#170a10 55%,#0e090c 100%)}
  #cn-login .lc{width:min(92vw,380px);background:rgba(30,16,23,.92);border:1px solid rgba(236,72,153,.35);border-radius:16px;padding:30px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  #cn-login .lg{font-size:30px;font-weight:800}
  #cn-login .lg b{color:var(--acc2)}
  #cn-login .sub{margin-top:6px;font-size:13px;color:#c397ab}
  #cn-login .badge{margin:16px auto 0}
  #cn-login .btn{margin-top:20px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--accd);color:#fff;font-size:15px;font-weight:700}
  #cn-login .btn:hover{background:var(--acc)}
  #cn-login .btn.ghost{background:transparent;border:1px solid rgba(195,151,171,.35);color:#a87f92;cursor:not-allowed;margin-top:10px}
  #cn-login .note{margin-top:16px;font-size:11.5px;line-height:1.6;color:#8f6e7e}
  #cn-login .ver{margin-top:14px;font-size:11px;color:#755966}

  /* ===== レイアウト ===== */
  #app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:54px 1fr;height:100vh}
  #topbar{grid-column:1/3;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:20}
  .logo{font-size:18px;font-weight:800}
  .logo b{color:var(--acc2)}
  .logo .ver{font-size:11px;color:var(--text3);font-weight:600;margin-left:4px}
  .spacer{flex:1}
  .tb-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px}
  .tb-btn:hover{border-color:var(--acc)}
  .tb-btn.primary{background:var(--accd);border-color:var(--accd);color:#fff;font-weight:600}
  .tb-btn.primary:hover{background:var(--acc)}

  #side{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:10px 0;z-index:10}
  #side-body{flex:1 1 auto}
  .sg{font-size:10px;color:var(--text3);letter-spacing:.08em;padding:12px 16px 4px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .si{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2)}
  .si:hover{background:var(--bg3);color:var(--text)}
  .si.on{background:var(--bg3);color:var(--text);box-shadow:inset 3px 0 0 var(--acc)}

  #main{display:flex;flex-direction:column;overflow:hidden;position:relative}
  .nhead{display:flex;align-items:center;gap:10px;padding:9px 16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2)}
  .ntitle{font-size:15px;font-weight:800}
  .nscope{font-size:11px;font-weight:700;color:var(--acc2);background:rgba(236,72,153,.12);border:1px solid rgba(236,72,153,.4);padding:3px 10px;border-radius:999px}
  .nlive{font-size:11px;color:var(--text2)}
  .nlive b{color:var(--acc2)}
  #n-body{flex:1;position:relative;overflow:hidden}

  /* ===== メモタイプ ===== */
  .memo{position:absolute;inset:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13.5px;line-height:1.9;padding:16px;resize:none}
  .memo:focus{outline:none;border-color:var(--acc)}

  /* ===== キャンバス ===== */
  .cv-wrap{position:absolute;inset:0;overflow:hidden;background:var(--cvbg);cursor:default;touch-action:none}
  .cv-wrap.pan{cursor:grab}
  .cv-wrap.panning{cursor:grabbing}
  .cv-wrap.placing{cursor:crosshair}
  .cv-canvas{position:absolute;left:0;top:0;width:1px;height:1px;transform-origin:0 0}
  .cv-grid{position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.3px, transparent 1.3px);background-size:26px 26px;pointer-events:none}
  #cv-svg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;z-index:1}
  #cv-items{position:absolute;left:0;top:0;z-index:2}
  #cv-ov{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;z-index:6}

  .el{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;line-height:1.4;color:#1f2430;user-select:none;cursor:grab;padding:8px;word-break:break-word;white-space:pre-wrap}
  .el .el-t{width:100%;outline:none;cursor:inherit;pointer-events:none;overflow:hidden}
  .el.sel .el-t,.el.editing .el-t{pointer-events:auto}
  .el-sticky{box-shadow:0 6px 14px rgba(0,0,0,.30);border-radius:3px;font-weight:600;align-items:flex-start;text-align:left}
  .el-rect{border-radius:2px;box-shadow:0 3px 8px rgba(0,0,0,.25);font-weight:600}
  .el-round{border-radius:16px;box-shadow:0 3px 8px rgba(0,0,0,.25);font-weight:600}
  .el-ellipse{border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,.25);font-weight:600}
  .el-diamond,.el-triangle{background:transparent!important;box-shadow:none}
  .el-text{background:transparent!important;color:var(--text);font-weight:600;box-shadow:none;justify-content:flex-start;text-align:left;align-items:flex-start;padding:4px 6px}
  .el-card{background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.28);flex-direction:column;align-items:stretch;text-align:left;padding:0;overflow:hidden;color:#1f2430}
  .el-card .cd-bar{height:6px;flex:0 0 auto}
  .el-card .cd-in{padding:9px 11px;display:flex;flex-direction:column;gap:4px;height:100%}
  .el-card .cd-title{font-weight:800;font-size:13px}
  .el-card .cd-body{font-size:11.5px;color:#48505e;line-height:1.5;flex:1}
  .el-frame{background:transparent!important;border:2px solid #7c8aa0;border-radius:6px;box-shadow:none;color:var(--text);align-items:flex-start;justify-content:flex-start;padding:0}
  .el-frame .fr-title{position:absolute;top:-22px;left:0;font-size:12px;font-weight:700;color:var(--text2);background:transparent;white-space:nowrap}
  .el-stamp{background:transparent!important;box-shadow:none;font-size:40px;padding:0}
  .el-comment{background:transparent!important;box-shadow:none;overflow:visible}
  .el-comment .cm-pin{width:30px;height:30px;border-radius:50% 50% 50% 2px;background:var(--accd);box-shadow:0 4px 10px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:15px;transform:rotate(0)}
  .el-image{background:#222!important;box-shadow:0 4px 12px rgba(0,0,0,.3);overflow:hidden;padding:0}
  .el-image img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block}
  .el.sel{outline:2px solid var(--acc);outline-offset:2px;z-index:5}
  .el.locked{outline-color:#f59e0b}
  .el.editing{cursor:text}
  .el .rsz{position:absolute;right:-7px;bottom:-7px;width:13px;height:13px;background:#fff;border:2px solid var(--acc);border-radius:3px;cursor:nwse-resize;display:none;pointer-events:auto;z-index:7}
  .el.sel:not(.locked) .rsz{display:block}
  /* コネクタ用アンカー（選択ツールでホバー時） */
  .anchor{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--acc);border:2px solid #fff;transform:translate(-50%,-50%);cursor:crosshair;pointer-events:auto;z-index:8;box-shadow:0 1px 3px rgba(0,0,0,.4)}

  /* ===== 上部ツールバー（Miro風・中央上） ===== */
  .cv-toolbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:6px;box-shadow:0 8px 26px rgba(0,0,0,.45)}
  .tool{position:relative;width:40px;height:40px;border-radius:10px;border:1px solid transparent;background:none;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center}
  .tool:hover{background:var(--bg3);color:var(--text)}
  .tool.on{background:rgba(236,72,153,.18);border-color:var(--acc);color:var(--text)}
  .tool .cw{position:absolute;right:3px;bottom:2px;font-size:8px;color:var(--text3)}
  .tsep{width:1px;height:26px;background:var(--border);margin:0 3px}
  /* 図形ポップ */
  .shape-pop,.tmpl-pop{position:absolute;top:60px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:31;display:none;grid-template-columns:repeat(5,40px);gap:4px}
  .shape-pop.open,.tmpl-pop.open{display:grid}
  .tmpl-pop{grid-template-columns:1fr;width:210px;gap:2px}
  .shape-pop .tool{width:40px;height:40px}
  .tmpl-pop button{display:flex;align-items:center;gap:9px;width:100%;background:none;border:0;color:var(--text);padding:9px 10px;border-radius:8px;font-size:13px;text-align:left}
  .tmpl-pop button:hover{background:var(--bg3)}

  /* ===== 選択時のフロート編集バー ===== */
  .ctxbar{position:absolute;z-index:32;display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:5px 7px;box-shadow:0 8px 24px rgba(0,0,0,.45);flex-wrap:wrap;max-width:560px}
  .ctxbar .sw{width:20px;height:20px;border-radius:6px;border:2px solid transparent;cursor:pointer}
  .ctxbar .sw.on{border-color:var(--text)}
  .ctxbar .cbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 8px;font-size:12px}
  .ctxbar .cbtn:hover{border-color:var(--acc)}
  .ctxbar .cbtn.danger:hover{border-color:#ef4444;color:#ef4444}
  .ctxbar .cgrp{display:flex;align-items:center;gap:3px}
  .ctxbar .vsep{width:1px;height:20px;background:var(--border);margin:0 2px}

  /* ===== ズーム・ナビ ===== */
  .cv-zoom{position:absolute;right:14px;bottom:14px;z-index:30;display:flex;align-items:center;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px 5px;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .cv-zoom button{background:none;border:0;color:var(--text);font-size:15px;width:28px;height:28px;border-radius:7px}
  .cv-zoom button:hover{background:var(--bg3)}
  .cv-zoom span{font-size:11.5px;color:var(--text2);min-width:40px;text-align:center;cursor:pointer}
  .cv-left{position:absolute;left:14px;bottom:14px;z-index:30;display:flex;gap:6px}
  .cv-left button{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:9px;padding:7px 10px;font-size:12px;box-shadow:0 4px 14px rgba(0,0,0,.35)}
  .cv-left button:hover{color:var(--text);border-color:var(--acc)}
  /* ミニマップ */
  #minimap{position:absolute;right:14px;bottom:56px;z-index:29;width:180px;height:120px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  #mm-svg{width:100%;height:100%;display:block}
  #mm-view{fill:rgba(236,72,153,.16);stroke:var(--acc);stroke-width:2;vector-effect:non-scaling-stroke}

  /* ===== 右クリックメニュー ===== */
  .menu{position:fixed;z-index:60;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:5px;box-shadow:0 12px 34px rgba(0,0,0,.5);min-width:180px;display:none}
  .menu.open{display:block}
  .menu button{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;background:none;border:0;color:var(--text);padding:8px 10px;border-radius:7px;font-size:13px;text-align:left}
  .menu button:hover{background:var(--bg3)}
  .menu button.danger:hover{color:#ef4444}
  .menu .k{color:var(--text3);font-size:11px}
  .menu .sep{height:1px;background:var(--border);margin:4px 2px}

  /* ===== ヘルプ ===== */
  .help-ov{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
  .help-ov.open{display:flex}
  .help-card{width:min(92vw,560px);max-height:84vh;overflow:auto;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px 24px}
  .help-card h3{margin:0 0 4px;font-size:17px}
  .help-card .hsub{color:var(--text2);font-size:12px;margin-bottom:14px}
  .help-card table{width:100%;border-collapse:collapse;font-size:13px}
  .help-card td{padding:5px 6px;border-bottom:1px solid var(--border)}
  .help-card td.k{color:var(--acc2);font-weight:700;white-space:nowrap;width:130px}
  .help-card .x{margin-top:16px;text-align:right}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;border:1px solid var(--border);padding:9px 16px;border-radius:10px;font-size:13px;z-index:80;opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}

  /* ===== マインドマップ特化モード ===== */
  .mm-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:6px 8px;box-shadow:0 8px 26px rgba(0,0,0,.45);flex-wrap:wrap;max-width:94%}
  .mm-bar button{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 11px;font-size:12.5px}
  .mm-bar button:hover{border-color:var(--acc)}
  .mm-hint{font-size:11px;color:var(--text3);margin-left:4px}
  .mmn{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;border-radius:12px;padding:7px 12px;box-shadow:0 4px 12px rgba(0,0,0,.26);font-weight:600;cursor:grab;user-select:none;line-height:1.35;word-break:break-word;color:#1f2430}
  .mmn.root{border-radius:18px;font-weight:800;box-shadow:0 6px 16px rgba(0,0,0,.4)}
  .mmn.sel{outline:3px solid var(--acc);outline-offset:2px;z-index:5}
  .mmn.editing{cursor:text}
  .mmn-t{width:100%;outline:none}
  .mmn-tg{position:absolute;right:-11px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4);z-index:6;cursor:pointer}
</style>
</head>
<body>

<div id="cn-login">
  <div class="lc">
    <div class="lg">📝 Core<b>Note</b></div>
    <div class="sub">Miro風ホワイトボード・共有メモ（小林モータース）</div>
    <div class="badge dev-badge">🚧 開発中サンプル</div>
    <button class="btn" onclick="cnLogin()">サンプルとして入る（開発用）</button>
    <button class="btn ghost" disabled>Google でログイン（後日対応）</button>
    <div class="note">付箋・図形・コネクタ・ペン・フレーム・画像などを自由に置けるホワイトボード。本実装では「ひとりが編集 → MTGで全員同時閲覧」を想定。</div>
    <div class="ver">CoreNote v0.4.0 (mock)</div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo">📝 Core<b>Note</b><span class="ver">v0.4.0</span></div>
    <span class="dev-badge">🚧 開発中サンプル</span>
    <div class="spacer"></div>
    <button class="tb-btn" onclick="cnHelp(true)">？ 使い方</button>
    <button class="tb-btn" onclick="cnTheme()" id="theme-btn" title="テーマ切替">🌙</button>
    <button class="tb-btn" onclick="cnNewMind()">＋🧠 マインドマップ</button>
    <button class="tb-btn primary" onclick="cnNewBoard()">＋ 新規ボード</button>
  </div>

  <div id="side"><div id="side-body"></div><div data-cf-launcher data-current="corenote"></div></div>

  <div id="main">
    <div class="nhead">
      <div class="ntitle" id="n-title"></div>
      <span class="nscope" id="n-scope"></span>
      <span class="nlive" id="n-live"></span>
    </div>
    <div id="n-body"></div>
  </div>
</div>

<div class="menu" id="ctxmenu"></div>
<div class="help-ov" id="help-ov" onclick="if(event.target===this)cnHelp(false)"></div>
<div class="toast" id="toast"></div>
<input type="file" id="img-input" accept="image/*" style="display:none">

<script>
/* ============================================================
   CoreNote v0.3.0 — Miro風ホワイトボード（単一ファイル・DBなし）
   付箋/テキスト/図形/コネクタ/ペン/フレーム/画像/カード/コメント/スタンプ
   無限キャンバス・複数選択・アンドゥ/リドゥ・テンプレ・PNG/JSON書出
   ============================================================ */
function cnLogin(){ try{localStorage.setItem('cn_authed','1')}catch(e){} document.getElementById('cn-login').style.display='none'; }
(function(){ let a=false; try{a=localStorage.getItem('cn_authed')==='1'}catch(e){} if(a)document.getElementById('cn-login').style.display='none'; })();
function cnTheme(){ const r=document.documentElement; const n=r.getAttribute('data-theme')==='light'?'dark':'light'; r.setAttribute('data-theme',n); document.getElementById('theme-btn').textContent=n==='light'?'☀️':'🌙'; }
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(p){ return (p||'e')+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1800); }

/* ===== 色パレット（付箋/図形/文字） ===== */
const FILLS=['#fde047','#fca5a5','#f9a8d4','#c4b5fd','#93c5fd','#7dd3fc','#86efac','#fdba74','#e5e7eb','#ffffff'];

/* ===== モデル ===== */
function mk(type,x,y,w,h,o){ return Object.assign({id:uid(), type:type, x:x,y:y,w:w,h:h, text:'', color:'#fde047', tcolor:'#1f2430', fs:14, locked:false}, o||{}); }

/* ===== サンプルボード ===== */
function boardColumn(){
  var items=[], conns=[];
  function a(it){ items.push(it); return it; }
  var root=a(mk('round',80,300,200,80,{text:'小林モータース\nコラム',color:'#f9a8d4',fs:16}));
  var cats=[['🚗 車検',120],['🔧 修理・整備',260],['🚙 中古車',400],['🎬 YouTube連動',540]];
  var catEls=cats.map(function(c){ return a(mk('sticky',380,c[1],170,64,{text:c[0],color:'#fde047'})); });
  var leaves=[['車検費用の内訳',40,'#93c5fd'],['車検の流れと期間',110,'#93c5fd'],['代車の借り方',180,'#93c5fd'],['エンジン異音の原因',270,'#86efac'],['オイル交換の頻度',340,'#86efac'],['失敗しない中古車選び',410,'#fdba74'],['下取りと買取の違い',480,'#fdba74'],['動画→記事の流用',560,'#f9a8d4']];

function renderAnchors(){

}

/* コネクタ端点：図形の中心同士を結び、各図形の境界で切る */
function edge(a,b){
  var ax=a.x+a.w/2, ay=a.y+a.h/2, bx=b.x+b.w/2, by=b.y+b.h/2;
  var p1=borderPoint(a,bx,by), p2=borderPoint(b,ax,ay);
  return {x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y};
}
function borderPoint(e,tx,ty){
  var cx=e.x+e.w/2, cy=e.y+e.h/2, dx=tx-cx, dy=ty-cy;
  if(dx===0&&dy===0)return {x:cx,y:cy};
  var hw=e.w/2, hh=e.h/2;
  var sx=dx===0?Infinity:hw/Math.abs(dx), sy=dy===0?Infinity:hh/Math.abs(dy);

function onDown(ev){

  // パンツール / スペース

  // ペン
  if(tool==='pen'){ penPts=[[pt.x,pt.y]]; return; }
  // 消しゴム
  if(tool==='eraser'){ eraseAt(ev,pt); drag={mode:'erase'}; return; }

  if(tool==='connector'){ var el0=ev.target.closest('.el'); if(el0){ var id0=el0.getAttribute('data-id'); if(!connDraft){ connDraft={from:id0,x1:pt.x,y1:pt.y,x2:pt.x,y2:pt.y}; } } return; }

  if(['sticky','text','frame','card','comment','stamp'].indexOf(tool)>=0){ placeAt(tool,pt); return; }
  if(tool==='image'){ document.getElementById('img-input')._pt=pt; document.getElementById('img-input').click(); return; }
  // 選択ツール
  var el=ev.target.closest('.el');
  var rsz=ev.target.classList&&ev.target.classList.contains('rsz');
  var conn=ev.target.closest('.conn');
  if(rsz && el){ var id=el.getAttribute('data-id'); var e=item(id); if(e&&!e.locked){ if(!isSel(id))sel=[id]; selConn=null; pushHist(); drag={mode:'resize',id:id,sw:e.w,sh:e.h,sx:pt.x,sy:pt.y}; render(); } return; }
  if(el){
    var id=el.getAttribute('data-id'); var e=item(id);
    selConn=null;
    if(ev.shiftKey){ if(isSel(id))sel=sel.filter(function(s){return s!==id;}); else sel.push(id); }
    else if(!isSel(id)){ sel=[id]; }
    if(e&&e.locked){ render(); return; }
    pushHist();
    var starts=sel.map(function(s){var it=item(s);return it?{id:s,x:it.x,y:it.y,pts:it.type==='pen'?it.points.map(function(p){return [p[0],p[1]];}):null}:null;}).filter(Boolean);
    drag={mode:'move',sx:pt.x,sy:pt.y,starts:starts,moved:false};
    render(); return;
  }
  if(conn){ selConn=conn.getAttribute('data-cid'); sel=[]; render(); return; }
  // 空白：ラバーバンド（shiftで追加）
  if(!ev.shiftKey){ sel=[]; selConn=null; }
  marquee={x0:pt.x,y0:pt.y,x1:pt.x,y1:pt.y,add:ev.shiftKey,base:sel.slice()};
  render();
}

/* ===== 要素操作 ===== */

function fontStep(d){ pushHist(); selItems().forEach(function(e){ e.fs=Math.max(9,Math.min(80,(e.fs||14)+d*2)); }); save(); render(); }
function order(dir){ var d=D(); pushHist(); sel.forEach(function(id){ var i=d.items.findIndex(function(e){return e.id===id;}); if(i<0)return; var e=d.items.splice(i,1)[0]; if(dir>0)d.items.push(e); else d.items.unshift(e); }); save(); render(); }

document.addEventListener('keydown',function(ev){
  var _mn=note();
  if(_mn&&_mn.type==='mindmap'){
    if(document.getElementById('cn-login').style.display!=='none')return;
    if(ev.target&&ev.target.isContentEditable){ /* 編集中のキーは mmEdit のハンドラに任せる */ return; }
    if(ev.key===' '&&!mmEditing){ spaceDown=true; var ww=document.getElementById('cv-wrap'); if(ww)ww.classList.add('pan'); return; }
    mmKeyHandler(ev); return;
  }
  if(ev.key===' '&&!editing){ spaceDown=true; var w=document.getElementById('cv-wrap'); if(w)w.classList.add('pan'); }
  if(editing)return;
  if(document.getElementById('cn-login').style.display!=='none')return;
  var n=note(); if(!n||n.type!=='canvas')return;
  var meta=ev.ctrlKey||ev.metaKey;
  if(meta&&ev.key.toLowerCase()==='z'){ ev.preventDefault(); if(ev.shiftKey)redo(); else undo(); return; }
  if(meta&&ev.key.toLowerCase()==='y'){ ev.preventDefault(); redo(); return; }
  if(meta&&ev.key.toLowerCase()==='c'){ copySel(); return; }
  if(meta&&ev.key.toLowerCase()==='v'){ paste(); return; }
  if(meta&&ev.key.toLowerCase()==='d'){ ev.preventDefault(); dup(); return; }
  if(meta&&ev.key.toLowerCase()==='a'){ ev.preventDefault(); selectAll(); return; }
  if(ev.key==='Delete'||ev.key==='Backspace'){ if(sel.length||selConn){ ev.preventDefault(); delSel(); } return; }
  if(ev.key==='Escape'){ sel=[];selConn=null;connDraft=null;setTool('select'); closeMenu(); cnHelp(false); render(); return; }
  if(ev.shiftKey&&ev.key==='1'){ zoomFit(); return; }
  if((ev.key==='+'||ev.key==='=')){ zoomBtn(1); return; }
  if(ev.key==='-'){ zoomBtn(-1); return; }
  // 矢印ナッジ
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(ev.key)>=0&&sel.length){ ev.preventDefault(); var s=ev.shiftKey?10:1; pushHist(); selItems().forEach(function(e){ if(e.type==='pen'){e.points=e.points.map(function(p){return [p[0]+(ev.key==='ArrowLeft'?-s:ev.key==='ArrowRight'?s:0),p[1]+(ev.key==='ArrowUp'?-s:ev.key==='ArrowDown'?s:0)];});} else { if(ev.key==='ArrowLeft')e.x-=s; if(ev.key==='ArrowRight')e.x+=s; if(ev.key==='ArrowUp')e.y-=s; if(ev.key==='ArrowDown')e.y+=s; } }); save(); render(); return; }
  // ツール切替
  var keymap={v:'select',h:'pan',n:'sticky',s:'sticky',t:'text',r:'shape:'+shapeKind,c:'connector',l:'connector',p:'pen',e:'eraser',f:'frame'};
  var k=ev.key.toLowerCase(); if(keymap[k]&&!meta){ setTool(keymap[k]); }
});

/* ============================================================
   マインドマップ特化モード
   中心→Enterで子・Tabで兄弟・矢印で移動・色は階層で自動・自動レイアウト
   ============================================================ */
function mmData(){ var n=note(); return (n&&n.type==='mindmap')?n.data:null; }
function mmGet(id){ var d=mmData(); return d?d.nodes.find(function(x){return x.id===id;}):null; }
function mmRoot(){ var d=mmData(); return d?d.nodes.find(function(x){return !x.parent;}):null; }
function mmKids(id){ var d=mmData(); return d?d.nodes.filter(function(x){return x.parent===id;}):[]; }
function mmDepth(n){ var dep=0,p=n.parent,guard=0; while(p&&guard++<50){ var pn=mmGet(p); if(!pn)break; dep++; p=pn.parent; } return dep; }
function mmSize(n){ var depth=mmDepth(n); var w=depth===0?210:170; var fs=depth===0?17:(depth===1?15:14); var t=(n.text||' '); var cpl=Math.max(5,Math.floor((w-24)/(fs*0.62))); var lines=0; t.split('\n').forEach(function(ln){ lines+=Math.max(1,Math.ceil((ln.length||1)/cpl)); }); var h=Math.max(depth===0?54:40, lines*(fs+6)+14); return {w:w,h:h,fs:fs}; }
function mmLayout(){
  var d=mmData(); if(!d)return; var root=mmRoot(); if(!root)return;
  var gapX=58, gapY=14;
  function measure(n){ var s=mmSize(n); n._w=s.w;n._h=s.h;n._fs=s.fs; var kids=mmKids(n.id); if(!kids.length||n.collapsed){ n._th=s.h; return s.h; } var th=0; kids.forEach(function(k,i){ if(i>0)th+=gapY; th+=measure(k); }); n._th=Math.max(s.h,th); return n._th; }
  function place(n,depth,top,x){ n._depth=depth; n._x=x; n._y=Math.round(top+n._th/2-n._h/2); var kids=mmKids(n.id); if(n.collapsed)return; var cy=top; kids.forEach(function(k){ place(k,depth+1,cy,x+n._w+gapX); cy+=k._th+gapY; }); }
  measure(root); place(root,0,0,0);
}
function renderMind(){

    +'</div>'

function bindMind(){

function renderMM(){
  var d=mmData(); var svg=document.getElementById('cv-svg'), box=document.getElementById('cv-items'); if(!d||!svg||!box)return;
  applyCam(); mmLayout(); var root=mmRoot(); if(!root){ box.innerHTML='';svg.innerHTML=''; return; }
  var sp='';
  d.nodes.forEach(function(n){ if(n.collapsed||n._x==null)return; mmKids(n.id).forEach(function(k){ if(k._x==null)return; var x1=n._x+n._w,y1=n._y+n._h/2,x2=k._x,y2=k._y+k._h/2,mx=(x1+x2)/2; sp+='<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="#9aa7b4" stroke-width="2"/>'; }); });
  svg.innerHTML=sp;
  var html='';
  d.nodes.forEach(function(n){ if(n._x==null)return; var depth=n._depth||0; var fill=MM_FILL[depth%MM_FILL.length], tc=MM_TXT[depth%MM_TXT.length]; var kc=mmKids(n.id).length; var selc=(mmSel===n.id);
    html+='<div class="mmn'+(selc?' sel':'')+(depth===0?' root':'')+'" data-id="'+n.id+'" style="left:'+n._x+'px;top:'+n._y+'px;width:'+n._w+'px;min-height:'+n._h+'px;background:'+fill+';color:'+tc+';font-size:'+n._fs+'px">'
      +'<div class="mmn-t">'+esc(n.text||'').replace(/\n/g,'<br>')+'</div>'
      +(kc?'<div class="mmn-tg" onclick="mmToggle(event,\''+n.id+'\')">'+(n.collapsed?('+'+kc):'−')+'</div>':'')
      +'</div>';
  });

function drawMiniMM(){
  var d=mmData(); var g=document.getElementById('mm-g'),vw=document.getElementById('mm-view'),svg=document.getElementById('mm-svg'),wr=document.getElementById('cv-wrap');
  if(!d||!g||!wr)return; var minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  d.nodes.forEach(function(n){ if(n._x==null)return; minx=Math.min(minx,n._x);miny=Math.min(miny,n._y);maxx=Math.max(maxx,n._x+n._w);maxy=Math.max(maxy,n._y+n._h); });
  if(minx===1e9)return;
  var vx=-cam.x/cam.z,vy=-cam.y/cam.z,vW=wr.clientWidth/cam.z,vH=wr.clientHeight/cam.z;
  minx=Math.min(minx,vx);miny=Math.min(miny,vy);maxx=Math.max(maxx,vx+vW);maxy=Math.max(maxy,vy+vH);
  var pad=60;minx-=pad;miny-=pad;maxx+=pad;maxy+=pad;
  svg.setAttribute('viewBox',minx+' '+miny+' '+(maxx-minx)+' '+(maxy-miny));
  var gp=''; d.nodes.forEach(function(n){ if(n._x==null)return; var depth=n._depth||0; gp+='<rect x="'+n._x+'" y="'+n._y+'" width="'+n._w+'" height="'+n._h+'" rx="4" fill="'+MM_FILL[depth%MM_FILL.length]+'"/>'; });
  g.innerHTML=gp; vw.setAttribute('x',vx);vw.setAttribute('y',vy);vw.setAttribute('width',vW);vw.setAttribute('height',vH);

function mmFit(){
  var d=mmData(); var wr=document.getElementById('cv-wrap'); if(!d||!wr)return; mmLayout();
  var minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9; d.nodes.forEach(function(n){ if(n._x==null)return; minx=Math.min(minx,n._x);miny=Math.min(miny,n._y);maxx=Math.max(maxx,n._x+n._w);maxy=Math.max(maxy,n._y+n._h); });
  if(minx===1e9)return; var pad=80; var z=Math.min(wr.clientWidth/(maxx-minx+pad*2), wr.clientHeight/(maxy-miny+pad*2), 1.4); z=Math.max(0.2,z);
  cam.z=z; cam.x=(wr.clientWidth-(maxx-minx)*z)/2-minx*z; cam.y=(wr.clientHeight-(maxy-miny)*z)/2-miny*z; applyCam(); renderMM();
}
function mmAdd(parentId,afterId){
  var d=mmData(); if(!d)return null; pushHist();
  var node={id:uid('n'),parent:parentId,text:'',collapsed:false};
  if(afterId){ var i=d.nodes.findIndex(function(x){return x.id===afterId;}); d.nodes.splice(i+1,0,node); } else d.nodes.push(node);
  mmSel=node.id; save(); renderMM(); ensureVisible(node.id); setTimeout(function(){ mmEdit(node.id); },10); return node;

function mmAddChild(id){ id=id||(mmRoot()&&mmRoot().id); if(!id)return; var n=mmGet(id); if(n&&n.collapsed){ n.collapsed=false; } mmAdd(id,null); }
function mmAddSibling(id){ var n=mmGet(id); if(!n)return; if(!n.parent){ mmAdd(id,null); return; } mmAdd(n.parent,id); }
function mmDelete(id){
  var n=mmGet(id); if(!n)return;
  if(!n.parent){ if(!confirm('中心ノードを消すとマインドマップ全体がリセットされます。よろしいですか？'))return; pushHist(); mmData().nodes=[{id:uid('n'),parent:null,text:'中心テーマ',collapsed:false}]; mmSel=mmData().nodes[0].id; save(); renderMM(); return; }
  pushHist(); var ids={}; (function col(x){ ids[x]=1; mmKids(x).forEach(function(k){col(k.id);}); })(id);
  var par=n.parent; mmData().nodes=mmData().nodes.filter(function(x){return !ids[x.id];}); mmSel=par; save(); renderMM();
}
function mmToggle(ev,id){ if(ev)ev.stopPropagation(); var n=mmGet(id); if(!n)return; pushHist(); n.collapsed=!n.collapsed; save(); renderMM(); }
function mmEditSel(){ if(mmSel)mmEdit(mmSel); }
function mmEdit(id){
  var n=mmGet(id); if(!n)return; mmSel=id; mmEditing=true; renderMM();
  var div=document.querySelector('.mmn[data-id="'+id+'"] .mmn-t'); if(!div){ mmEditing=false; return; }
  pushHist();
  div.parentElement.classList.add('editing');
  div.setAttribute('contenteditable','true'); div.textContent=n.text; div.focus();
  try{ document.execCommand('selectAll',false,null); }catch(_){}
  function commit(){ n.text=div.innerText.replace(/\n$/,''); }
  div.onblur=function(){ commit(); mmEditing=false; save(); renderMM(); };
  div.onkeydown=function(ev){
    if(ev.key==='Enter'&&!ev.shiftKey){ ev.preventDefault(); ev.stopPropagation(); commit(); div.onblur=null; mmEditing=false; save(); mmAddChild(id); return; }
    if(ev.key==='Tab'){ ev.preventDefault(); ev.stopPropagation(); commit(); div.onblur=null; mmEditing=false; save(); mmAddSibling(id); return; }
    if(ev.key==='Escape'){ ev.preventDefault(); ev.stopPropagation(); div.blur(); }
  };
}
function ensureVisible(id){ var n=mmGet(id); var wr=document.getElementById('cv-wrap'); if(!n||!wr||n._x==null)return; var sx=n._x*cam.z+cam.x, sy=n._y*cam.z+cam.y, ex=(n._x+n._w)*cam.z+cam.x, ey=(n._y+n._h)*cam.z+cam.y, m=40; if(sx<m)cam.x+=(m-sx); if(ex>wr.clientWidth-m)cam.x-=(ex-(wr.clientWidth-m)); if(sy<m)cam.y+=(m-sy); if(ey>wr.clientHeight-m)cam.y-=(ey-(wr.clientHeight-m)); applyCam(); }
function mmNav(key){
  var n=mmGet(mmSel); if(!n)return;
  if(key==='ArrowRight'){ var k=mmKids(n.id); if(k.length&&!n.collapsed)mmSel=k[0].id; }
  else if(key==='ArrowLeft'){ if(n.parent)mmSel=n.parent; }
  else { var sibs=mmKids(n.parent||null); var i=sibs.findIndex(function(x){return x.id===n.id;}); if(key==='ArrowUp'&&i>0)mmSel=sibs[i-1].id; if(key==='ArrowDown'&&i>=0&&i<sibs.length-1)mmSel=sibs[i+1].id; }
  renderMM(); ensureVisible(mmSel);
}
function mmKeyHandler(ev){
  if(mmEditing)return;
  var meta=ev.ctrlKey||ev.metaKey;
  if(meta&&ev.key.toLowerCase()==='z'){ ev.preventDefault(); if(ev.shiftKey)redo();else undo(); return; }
  if(meta&&ev.key.toLowerCase()==='y'){ ev.preventDefault(); redo(); return; }
  if(meta)return;
  if(!mmSel){ var r=mmRoot(); if(r)mmSel=r.id; }
  if(ev.key==='Enter'){ ev.preventDefault(); mmAddChild(mmSel); return; }
  if(ev.key==='Tab'){ ev.preventDefault(); mmAddSibling(mmSel); return; }
  if(ev.key==='F2'){ ev.preventDefault(); mmEditSel(); return; }
  if(ev.key==='Delete'||ev.key==='Backspace'){ ev.preventDefault(); mmDelete(mmSel); return; }
  if(ev.key==='Escape'){ mmSel=null; renderMM(); return; }
  if(ev.shiftKey&&ev.key==='1'){ ev.preventDefault(); mmFit(); return; }
  if(ev.key==='+'||ev.key==='='){ zoomBtn(1); return; }
  if(ev.key==='-'){ zoomBtn(-1); return; }
  if(ev.key.indexOf('Arrow')===0){ ev.preventDefault(); mmNav(ev.key); return; }
  if(ev.key.length===1&&ev.key!==' '){ mmEdit(mmSel); var div=document.querySelector('.mmn[data-id="'+mmSel+'"] .mmn-t'); if(div)div.textContent=''; }
}
